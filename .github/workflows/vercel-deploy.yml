name: Vercel Deploy (Reusable)

on:
  workflow_call:
    inputs:
      production:
        description: "Deploy to production. False for PR preview."
        required: false
        default: true
        type: boolean
      node-version:
        description: "Node.js version to use"
        required: false
        default: "20"
        type: string
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack (activates pnpm/yarn from package.json#packageManager)
        run: |
          corepack enable
          corepack prepare --activate 2>/dev/null || true

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ inputs.production && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: |
          vercel build ${{ inputs.production && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ inputs.production && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to $URL"

      - name: Comment preview URL on PR
        if: ${{ !inputs.production && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Preview deployed: ${{ steps.deploy.outputs.deployment-url }}`
            })
